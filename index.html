<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Chalet Drouin</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1c1c1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg:     #1c1c1e;
      --bg2:    #2c2c2e;
      --text:   #f0f0f5;
      --text2:  #9a9a9e;
      --text3:  #555;
      --border: #3a3a3c;
      --blue:   #4f8ef7;
      --red:    #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    body {
      display: flex; flex-direction: row;
      height: 100dvh;
      overscroll-behavior: none;
    }
    .main {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 210px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 20px 10px;
      gap: 2px;
    }
    .sidebar-brand {
      font-size: 15px; font-weight: 700;
      color: var(--text); letter-spacing: -.01em;
      padding: 4px 12px 20px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      font-size: 14px; font-weight: 500; color: var(--text2);
      cursor: pointer; border: none; background: none; width: 100%;
      text-align: left; transition: background .1s, color .1s;
    }
    .nav-item:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .nav-item.active { background: rgba(79,142,247,.15); color: var(--blue); }
    .nav-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      stroke: currentColor; fill: none; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Header ── */
    .hdr {
      display: flex; flex-direction: column;
      padding: 10px 14px 0; gap: 6px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      overflow: hidden;
    }
    .hdr-mountains {
      width: 100%; height: 40px;
      margin-top: 4px;
      opacity: .5;
      object-fit: cover;
      object-position: center;
    }
    .hdr-brand-mobile {
      display: none;
      font-size: 15px; font-weight: 700; letter-spacing: -.01em;
    }
    .hdr-nav-row {
      display: flex; align-items: center; gap: 8px;
    }
    .hdr-title {
      flex: 1; text-align: center;
      font-size: 15px; font-weight: 600;
      letter-spacing: -.01em; color: var(--text2);
    }
    .hdr-nav {
      width: 30px; height: 30px;
      background: var(--bg2); border: none; border-radius: 8px;
      color: var(--text); font-size: 18px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ── Mobile ── */
    @media (max-width: 639px) {
      body { flex-direction: column; }
      .main { order: 1; flex: 1; min-height: 0; }
      .sidebar {
        order: 2; width: 100%;
        flex-direction: row;
        padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
        border-right: none; border-top: 1px solid var(--border);
        gap: 0;
      }
      .sidebar-brand { display: none; }
      .nav-item {
        flex: 1; flex-direction: column; justify-content: center;
        padding: 6px 4px; gap: 3px;
        font-size: 10px; text-align: center; border-radius: 8px;
      }
      .nav-icon { width: 22px; height: 22px; }
      .hdr-brand-mobile { display: block; }
    }

    /* ── Calendar ── */
    .cal-outer {
      flex: 1; display: flex; flex-direction: column;
      padding: 6px 8px 8px; min-height: 0;
    }
    .dow-row {
      display: grid; grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .dow-cell {
      text-align: center; font-size: clamp(8px, 1.6vw, 11px); font-weight: 500;
      color: var(--text2);
      letter-spacing: .01em;
      padding: 2px 0; overflow: hidden;
    }

    .cal-grid {
      flex: 1; min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .dc {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 3px 3px 2px;
      display: flex; flex-direction: column; gap: 1px;
      overflow-x: visible; overflow-y: clip;
      cursor: pointer;
      min-height: 0;
    }
    .dc:nth-child(7n)   { border-right: none; }
    .dc:nth-last-child(-n+7) { border-bottom: none; }
    .dc:hover { background: rgba(79,142,247,.06); }

    .dn {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 12px; font-weight: 500;
      flex-shrink: 0;
    }
    .dn.today  { background: var(--blue); color: #fff !important; }
    .dn.ov     { color: var(--text3); font-weight: 400; }

    .bk {
      font-size: 9px; font-weight: 600;
      padding: 0; padding-left: 4px;
      min-height: 14px; line-height: 14px;
      color: #fff;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex-shrink: 0; cursor: pointer;
      margin: 0 -4px 0 -3px;
      position: relative; z-index: 1;
      border-radius: 0;
    }
    .bk-start {
      margin-left: 0;
      border-radius: 4px 0 0 4px;
    }
    .bk-end {
      margin-right: 0;
      border-radius: 0 4px 4px 0;
    }
    .bk-start.bk-end {
      border-radius: 4px;
    }
    .bk-spacer {
      min-height: 14px; flex-shrink: 0;
    }
    .bk-more {
      font-size: 9px; color: var(--text3); padding-left: 2px; flex-shrink: 0;
    }

    /* ── Modal overlay ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: flex-end;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .sheet {
      width: 100%; max-height: 88dvh;
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      padding: 16px 20px calc(22px + env(safe-area-inset-bottom));
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .25s cubic-bezier(.32,1,.23,1);
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-grip {
      width: 38px; height: 4px; border-radius: 2px;
      background: var(--border); margin: -4px auto 14px;
    }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }

    /* ── Desktop modals ── */
    @media (min-width: 640px) {
      .overlay {
        background: rgba(0,0,0,.25);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
      }
      .sheet {
        max-width: 420px;
        max-height: 80dvh;
        border-radius: 16px;
        border: .5px solid var(--border);
        background: var(--bg2);
        padding: 28px 24px;
        transform: scale(.96);
        opacity: 0;
        transition: transform .25s cubic-bezier(.4,0,.2,1), opacity .2s;
      }
      .overlay.open .sheet {
        transform: scale(1);
        opacity: 1;
      }
      .sheet-grip { display: none; }
    }

    /* ── Form ── */
    .ff { margin-bottom: 13px; }
    .fl {
      font-size: 11px; font-weight: 600;
      color: var(--text2); text-transform: uppercase; letter-spacing: .06em;
      display: block; margin-bottom: 5px;
    }
    .fi {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--bg2); color: var(--text);
      font-size: 15px; outline: none;
      -webkit-appearance: none;
      transition: border-color .15s;
    }
    .fi:focus { border-color: var(--blue); }

    .btns { display: flex; gap: 10px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 13px; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-c { background: var(--bg2); color: var(--text); }
    .btn-p { background: var(--blue); color: #fff; }
    .btn-d { background: var(--red); color: #fff; }

    /* ── Day detail list ── */
    .bk-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .bk-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .bk-info { flex: 1; min-width: 0; }
    .bk-name { font-size: 15px; font-weight: 600; }
    .bk-dates { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .bk-del {
      padding: 5px 11px; background: var(--red); color: #fff;
      border: none; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0;
    }
    .empty { color: var(--text3); font-size: 14px; text-align: center; padding: 20px 0; }

    /* ── Settings ── */
    .settings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .settings-info { flex: 1; min-width: 0; }
    .settings-label { font-size: 15px; font-weight: 600; }
    .settings-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* ── Inventory view ── */
    .inv-view {
      flex: 1; display: none; flex-direction: column;
      padding: 16px 16px 8px; min-height: 0; overflow-y: auto;
    }
    .inv-view.active { display: flex; }
    .inv-title {
      font-size: 18px; font-weight: 700; margin-bottom: 14px;
    }
    .inv-list { flex: 1; min-height: 0; overflow-y: auto; padding-bottom: 8px; }
    .inv-cat {
      font-size: 12px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 16px 0 6px; border-bottom: 1px solid var(--border);
    }
    .inv-cat:first-child { padding-top: 0; }
    .inv-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .inv-name { flex: 1; font-size: 15px; font-weight: 500; min-width: 0; }
    .inv-toggle {
      display: flex; flex-shrink: 0;
      background: var(--bg); border-radius: 8px;
      border: .5px solid var(--border); overflow: hidden;
    }
    .inv-opt {
      padding: 5px 8px; font-size: 11px; font-weight: 500;
      color: var(--text3); cursor: pointer;
      border: none; background: none;
      transition: background .15s, color .15s;
    }
    .inv-opt.on-0 { background: var(--red); color: #fff; }
    .inv-opt.on-1 { background: #eab308; color: #fff; }
    .inv-opt.on-2 { background: #22c55e; color: #fff; }
    .inv-del {
      padding: 4px 8px; background: none; border: none;
      color: var(--text3); font-size: 16px; cursor: pointer;
    }
    .inv-del:hover { color: var(--red); }
    .inv-add {
      display: flex; gap: 8px; padding: 14px 0; flex-shrink: 0;
    }
    .inv-add .fi { flex: 1; padding: 10px 12px; font-size: 14px; }
    .inv-add .btn { flex: none; width: 44px; padding: 0; font-size: 20px; }

    /* ── Loader ── */
    .loader {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--text3); font-size: 14px;
      z-index: 300; transition: opacity .3s;
    }
    .loader.gone { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div class="loader" id="loader">Chargement…</div>

<nav class="sidebar">
  <div class="sidebar-brand">Chalet Drouin</div>
  <button class="nav-item active" onclick="showView('cal')">
    <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Calendrier
  </button>
  <button class="nav-item" onclick="openCreate(null)">
    <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Réserver
  </button>
  <button class="nav-item" onclick="showView('inv')">
    <svg class="nav-icon" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Inventaire
  </button>
  <button class="nav-item" onclick="openSettings()">
    <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Paramètres
  </button>
</nav>

<div class="main">
  <div class="hdr">
    <div class="hdr-brand-mobile">Chalet Drouin</div>
    <div class="hdr-nav-row">
      <button class="hdr-nav" onclick="nav(-1)">‹</button>
      <div class="hdr-title" id="month-lbl"></div>
      <button class="hdr-nav" onclick="nav(1)">›</button>
    </div>
    <img class="hdr-mountains" src="mountains.png" alt="">
  </div>
  <div class="cal-outer" id="view-cal">
    <div class="dow-row" id="dow"></div>
    <div class="cal-grid" id="grid"></div>
  </div>

  <div class="inv-view" id="view-inv">
    <div class="inv-title">Inventaire</div>
    <div class="inv-list" id="inv-body"></div>
    <div class="inv-add">
      <select class="fi" id="f-inv-cat" style="flex:none;width:auto;padding:10px 8px;font-size:13px;">
        <option>Épicerie</option><option>Boissons</option><option>Frais</option><option>Entretien</option><option>Autre</option>
      </select>
      <input class="fi" id="f-inv-name" type="text" placeholder="Ajouter…" onkeydown="if(event.key==='Enter')addInvItem()">
      <button class="btn btn-p" onclick="addInvItem()">+</button>
    </div>
  </div>
</div>

<!-- Create modal -->
<div class="overlay" id="m-create" onclick="bgClose(event,'m-create')">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-title">Nouvelle réservation</div>
    <div class="ff">
      <label class="fl">Qui / Description</label>
      <input class="fi" id="f-desc" type="text" autocomplete="off" autocorrect="off">
    </div>
    <div class="ff">
      <label class="fl">Arrivée</label>
      <input class="fi" id="f-start" type="date">
    </div>
    <div class="ff">
      <label class="fl">Départ</label>
      <input class="fi" id="f-end" type="date">
    </div>
    <div class="btns">
      <button class="btn btn-c" onclick="close1('m-create')">Annuler</button>
      <button class="btn btn-p" onclick="submitCreate()">Réserver</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="overlay" id="m-settings" onclick="bgClose(event,'m-settings')">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-title">Paramètres</div>
    <div class="settings-row">
      <div class="settings-info">
        <div class="settings-label">Notifications</div>
        <div class="settings-desc" id="notif-status">Chargement…</div>
      </div>
      <button class="btn btn-p" id="notif-btn" onclick="enablePush()" style="flex:none;padding:10px 16px;font-size:13px;">Activer</button>
    </div>
    <div class="btns" style="margin-top:20px">
      <button class="btn btn-c" onclick="close1('m-settings')">Fermer</button>
    </div>
  </div>
</div>

<!-- Day detail modal -->
<div class="overlay" id="m-day" onclick="bgClose(event,'m-day')">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-title" id="day-title"></div>
    <div id="day-body"></div>
    <div class="btns" style="margin-top:14px">
      <button class="btn btn-c" onclick="close1('m-day')">Fermer</button>
      <button class="btn btn-p" onclick="createFromDay()">+ Réserver</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────
// Remplacez par l'URL de votre Worker après déploiement :
const API = 'https://maison-vacances.chaletdrouin.workers.dev';
// ───────────────────────────────────────────────────────

const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MSHO   = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const DOW    = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const COLORS = ['#4f8ef7','#22c55e','#f97316','#ec4899','#8b5cf6','#eab308','#ef4444','#06b6d4'];

let cY = new Date().getFullYear(), cM = new Date().getMonth();
let bookings = [], dayCx = null;
const TODAY = ymd(new Date());

function ymd(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseD(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtD(s) {
  const d=parseD(s);
  return d.getDate()+' '+MSHO[d.getMonth()]+(d.getFullYear()!==cY?' '+d.getFullYear():'');
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// DOW header
(()=>{
  const row=document.getElementById('dow');
  DOW.forEach((d,i)=>{
    const c=document.createElement('div');
    c.className='dow-cell'+(i>=5?' we':'');
    c.textContent=d;
    row.appendChild(c);
  });
})();

async function load() {
  try {
    const r = await fetch(API+'/bookings');
    if (!r.ok) throw 0;
    bookings = await r.json();
  } catch { bookings=[]; }
  document.getElementById('loader').classList.add('gone');
  render();
}

function nav(d){ cM+=d; if(cM>11){cM=0;cY++;} if(cM<0){cM=11;cY--;} render(); }

function render() {
  document.getElementById('month-lbl').textContent = MONTHS[cM]+' '+cY;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const first = new Date(cY,cM,1);
  const last  = new Date(cY,cM+1,0);
  let sdow = (first.getDay()+6)%7;

  const cells = [];
  const prevLast = new Date(cY,cM,0);
  for(let i=sdow;i>0;i--)
    cells.push({ date:new Date(prevLast.getFullYear(),prevLast.getMonth(),prevLast.getDate()-i+1), ov:true });
  for(let d=1;d<=last.getDate();d++) cells.push({ date:new Date(cY,cM,d), ov:false });
  const nxt=new Date(cY,cM+1,1);
  for(let d=1;cells.length<42;d++) cells.push({ date:new Date(nxt.getFullYear(),nxt.getMonth(),d), ov:true });

  for(let row=0;row<6;row++){
    const week=cells.slice(row*7,row*7+7);
    const ws=ymd(week[0].date), we=ymd(week[6].date);

    const wbks=bookings
      .filter(b=>b.start<=we&&b.end>=ws)
      .sort((a,b)=>a.start<b.start?-1:a.start>b.start?1:a.end>b.end?-1:a.end<b.end?1:0);

    const laneEnds=[];
    const bkLane=new Map();
    for(const bk of wbks){
      let lane=laneEnds.findIndex(e=>e<bk.start);
      if(lane===-1){lane=laneEnds.length;laneEnds.push('');}
      laneEnds[lane]=bk.end;
      bkLane.set(bk.id,lane);
    }
    const maxLane=Math.min(laneEnds.length,3);

    week.forEach((cell,col)=>{
      const ds=ymd(cell.date);
      const div=document.createElement('div');
      div.className='dc';
      div.onclick=(e)=>{if(!e.target.classList.contains('bk'))openDay(ds);};

      const dn=document.createElement('div');
      dn.className='dn'+(ds===TODAY?' today':cell.ov?' ov':'');
      dn.textContent=cell.date.getDate();
      div.appendChild(dn);

      for(let lane=0;lane<maxLane;lane++){
        const bk=wbks.find(b=>bkLane.get(b.id)===lane&&b.start<=ds&&b.end>=ds);
        if(bk){
          const chip=document.createElement('div');
          chip.className='bk';
          chip.style.background=bk.color;
          const isStart=bk.start===ds||col===0;
          const isEnd=bk.end===ds||col===6;
          if(isStart)chip.classList.add('bk-start');
          if(isEnd)chip.classList.add('bk-end');
          chip.textContent=isStart?esc(bk.description||''):'';
          chip.onclick=(e)=>{e.stopPropagation();openDay(ds);};
          div.appendChild(chip);
        } else {
          const sp=document.createElement('div');
          sp.className='bk-spacer';
          div.appendChild(sp);
        }
      }

      const total=bookings.filter(b=>b.start<=ds&&b.end>=ds).length;
      if(total>maxLane){
        const m=document.createElement('div');
        m.className='bk-more';
        m.textContent='+'+(total-maxLane);
        div.appendChild(m);
      }

      grid.appendChild(div);
    });
  }
}

function openDay(ds) {
  dayCx=ds;
  const d=parseD(ds);
  document.getElementById('day-title').textContent =
    DOW[(d.getDay()+6)%7]+' '+d.getDate()+' '+MONTHS[d.getMonth()];

  const bks=bookings.filter(b=>b.start<=ds&&b.end>=ds);
  const body=document.getElementById('day-body');
  body.innerHTML='';

  if(!bks.length){
    body.innerHTML='<div class="empty">Aucune réservation</div>';
  } else {
    bks.forEach(b=>{
      const row=document.createElement('div');
      row.className='bk-row';
      row.innerHTML=`<div class="bk-dot" style="background:${b.color}"></div>
        <div class="bk-info">
          <div class="bk-name">${esc(b.description||'—')}</div>
          <div class="bk-dates">${fmtD(b.start)} → ${fmtD(b.end)}</div>
        </div>`;
      const del=document.createElement('button');
      del.className='bk-del';
      del.textContent='Supprimer';
      del.onclick=()=>doDelete(b.id);
      row.appendChild(del);
      body.appendChild(row);
    });
  }
  open1('m-day');
}

function openSettings() {
  updateNotifStatus();
  open1('m-settings');
}

function updateNotifStatus() {
  const statusEl = document.getElementById('notif-status');
  const btn = document.getElementById('notif-btn');
  if (!('PushManager' in window)) {
    statusEl.textContent = 'Non supporté sur ce navigateur';
    btn.style.display = 'none';
    return;
  }
  const perm = Notification.permission;
  if (perm === 'granted') {
    statusEl.textContent = 'Activées';
    btn.textContent = 'Activées ✓';
    btn.disabled = true;
    btn.style.opacity = '.5';
  } else if (perm === 'denied') {
    statusEl.textContent = 'Bloquées — modifie les permissions du site dans les réglages du navigateur';
    btn.style.display = 'none';
  } else {
    statusEl.textContent = 'Désactivées';
    btn.textContent = 'Activer';
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

async function enablePush() {
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { updateNotifStatus(); return; }
    await subscribePush();
    updateNotifStatus();
  } catch (e) { console.error('Push enable failed:', e); }
}

async function subscribePush() {
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    const res = await fetch(API + '/vapid-public-key');
    const { key } = await res.json();
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: b64urlToUint8(key),
    });
  }
  await fetch(API + '/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(sub),
  });
}

let inventory = [];

async function showView(name) {
  const navBtns = document.querySelectorAll('.nav-item');
  const idx = name === 'cal' ? 0 : 2;
  navBtns.forEach((b, i) => b.classList.toggle('active', i === idx));

  const hdr = document.querySelector('.hdr');
  const cal = document.getElementById('view-cal');
  const inv = document.getElementById('view-inv');

  if (name === 'inv') {
    hdr.style.display = 'none';
    cal.style.display = 'none';
    inv.classList.add('active');
    if (!inventory.length) {
      try {
        const r = await fetch(API + '/inventory');
        if (r.ok) inventory = await r.json();
      } catch {}
    }
    renderInventory();
  } else {
    hdr.style.display = '';
    cal.style.display = '';
    inv.classList.remove('active');
  }
}

const CAT_ORDER = ['Épicerie','Boissons','Frais','Entretien','Autre'];

function renderInventory() {
  const body = document.getElementById('inv-body');
  body.innerHTML = '';
  if (!inventory.length) {
    body.innerHTML = '<div class="empty">Aucun article</div>';
    return;
  }
  const groups = {};
  inventory.forEach(item => {
    const c = item.cat || 'Autre';
    (groups[c] = groups[c] || []).push(item);
  });
  const cats = Object.keys(groups).sort((a, b) => {
    const ia = CAT_ORDER.indexOf(a), ib = CAT_ORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });
  cats.forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'inv-cat';
    hdr.textContent = cat;
    body.appendChild(hdr);
    groups[cat].forEach(item => {
      const row = document.createElement('div');
      row.className = 'inv-item';
      const q = Math.min(2, Math.max(0, item.qty));
      row.innerHTML = `
        <div class="inv-name">${esc(item.name)}</div>
        <div class="inv-toggle">
          <button class="inv-opt${q===0?' on-0':''}" onclick="setInvQty('${item.id}',0)">Aucun</button>
          <button class="inv-opt${q===1?' on-1':''}" onclick="setInvQty('${item.id}',1)">Un peu</button>
          <button class="inv-opt${q===2?' on-2':''}" onclick="setInvQty('${item.id}',2)">Beaucoup</button>
        </div>
        <button class="inv-del" onclick="deleteInvItem('${item.id}')" title="Supprimer">✕</button>`;
      body.appendChild(row);
    });
  });
}

async function addInvItem() {
  const inp = document.getElementById('f-inv-name');
  const cat = document.getElementById('f-inv-cat').value;
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  try {
    const r = await fetch(API + '/inventory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, cat, qty: 1 })
    });
    if (r.ok) {
      const item = await r.json();
      inventory.push(item);
      inp.value = '';
      renderInventory();
    }
  } catch { alert('Erreur réseau'); }
}

async function setInvQty(id, level) {
  const item = inventory.find(i => i.id === id);
  if (!item) return;
  try {
    const r = await fetch(API + '/inventory/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ qty: level })
    });
    if (r.ok) { item.qty = level; renderInventory(); }
  } catch {}
}

async function deleteInvItem(id) {
  try {
    await fetch(API + '/inventory/' + id, { method: 'DELETE' });
    inventory = inventory.filter(i => i.id !== id);
    renderInventory();
  } catch {}
}

function openCreate(ds) {
  document.getElementById('f-desc').value='';
  document.getElementById('f-start').value=ds||TODAY;
  document.getElementById('f-end').value=ds||TODAY;
  open1('m-create');
}
function createFromDay(){ close1('m-day'); openCreate(dayCx); }

async function submitCreate() {
  const start=document.getElementById('f-start').value;
  const end  =document.getElementById('f-end').value;
  const desc =document.getElementById('f-desc').value.trim();
  if(!desc){ document.getElementById('f-desc').focus(); return; }
  if(!start||!end) return;
  if(end<start){ document.getElementById('f-end').value=start; return; }
  try {
    const r=await fetch(API+'/bookings',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({start,end,description:desc,color:COLORS[bookings.length%COLORS.length]})
    });
    if(!r.ok) throw 0;
    close1('m-create');
    await load();
  } catch { alert('Erreur. Vérifiez votre connexion.'); }
}

async function doDelete(id) {
  if(!confirm('Supprimer cette réservation ?')) return;
  try {
    await fetch(API+'/bookings/'+id,{method:'DELETE'});
    close1('m-day');
    await load();
  } catch { alert('Erreur. Vérifiez votre connexion.'); }
}

function open1(id){ document.getElementById(id).classList.add('open'); }
function close1(id){ document.getElementById(id).classList.remove('open'); }
function bgClose(e,id){ if(e.target.classList.contains('overlay')) close1(id); }

// Service worker + Push
function b64urlToUint8(str) {
  const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
  const pad = (4 - b64.length % 4) % 4;
  const bin = atob(b64 + '='.repeat(pad));
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

async function initSW() {
  if (!('serviceWorker' in navigator)) return;
  await navigator.serviceWorker.register('sw.js');
  if (Notification.permission === 'granted') {
    try { await subscribePush(); } catch {}
  }
}
initSW();

load();
</script>
